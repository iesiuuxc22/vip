<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VipCam • دخول خاص مباشر</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;900&family=Changa:wght@400;700;800&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Changa', sans-serif;
    background: radial-gradient(circle at top, #2a0066, #000);
    color: white;
    display: flex;
    justify-content: center;
}

.container {
    max-width: 420px;
    width: 100%;
    background: #000;
}

/* HEADER */
.header {
    direction: ltr;
    background: linear-gradient(90deg, #6a00ff, #b100ff);
    padding: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-family: 'Poppins', sans-serif;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-shadow:
        0 0 10px rgba(255,0,150,0.8),
        0 0 20px rgba(255,0,150,0.6),
        0 0 30px rgba(255,0,150,0.4);
}

.live-now {
    background: #ff0033;
    padding: 4px 9px;
    border-radius: 5px;
    font-size: 11px;
    font-weight: 800;
    animation: blink 1.2s infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}

.viewers {
    font-size: 11px;
    margin-top: 3px;
    font-weight: 700;
}

/* LIVE AREA */
.video {
    position: relative;
    height: 260px;
    overflow: hidden;
    cursor: pointer;
    background: #000;
}

.frame-wrap {
    position: absolute;
    inset: 0;
    overflow: hidden;
    z-index: 1;
}

/* Crop the embedded page so it looks like a fixed video window */
.video iframe {
    position: absolute;
    top: -38px;
    left: -18px;
    width: 118%;
    height: 138%;
    border: none;
    pointer-events: none;
    opacity: 1;
    transition: opacity 0.25s ease;
}

/* Fallback preview so it never looks blank */
.fallback-preview {
    position: absolute;
    inset: 0;
    z-index: 0;
    background:
        linear-gradient(to top, rgba(0,0,0,0.45), rgba(0,0,0,0.1)),
        radial-gradient(circle at top, #3b0d54 0%, #140018 55%, #000 100%);
}

.fallback-preview::before {
    content: "LIVE PREVIEW";
    position: absolute;
    top: 14px;
    left: 14px;
    background: rgba(255, 0, 51, 0.95);
    color: #fff;
    font-size: 11px;
    font-weight: 800;
    padding: 4px 9px;
    border-radius: 5px;
    animation: blink 1.2s infinite;
}

.fallback-preview::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
        radial-gradient(circle at 70% 30%, rgba(255,0,140,0.22), transparent 25%),
        radial-gradient(circle at 35% 55%, rgba(255,255,255,0.06), transparent 20%);
}

/* Overlays */
.notice {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.72);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    z-index: 3;
}

.tag {
    position: absolute;
    bottom: 10px;
    left: 10px;
    background: #00ff88;
    color: black;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 800;
    z-index: 3;
}

/* CONTENT */
.content {
    padding: 22px;
    text-align: right;
}

.title {
    text-align: center;
    color: #aaa;
    margin-bottom: 18px;
}

.card {
    background: linear-gradient(145deg, #151515, #0a0a0a);
    padding: 18px;
    border-radius: 12px;
    margin-bottom: 14px;
    border: 1px solid #444;
    cursor: pointer;
    transition: 0.25s;
    box-shadow:
        inset 0 0 10px rgba(255,255,255,0.03),
        0 0 8px rgba(255,255,255,0.04);
}

.card:hover {
    border-color: #777;
    transform: scale(1.015);
}

.vip {
    border: 2px solid #FFD700;
    background: linear-gradient(145deg, rgba(255,215,0,0.08), rgba(0,0,0,0));
    box-shadow:
        0 0 10px rgba(255,215,0,0.3),
        0 0 25px rgba(255,215,0,0.15);
    transform: scale(1.03);
}

.badge {
    background: #FFD700;
    color: #000;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 900;
    margin-bottom: 10px;
    display: inline-block;
}

.price {
    font-size: 26px;
    font-weight: 900;
}

.vip .price {
    color: #FFD700;
}

.features {
    font-size: 14px;
    color: #bbb;
    margin-top: 12px;
    padding-right: 18px;
}

.features li {
    margin-bottom: 8px;
}

/* CTA */
.footer {
    padding: 16px;
}

.btn {
    display: block;
    text-align: center;
    background: linear-gradient(90deg, #6a00ff, #ff00cc);
    padding: 20px;
    border-radius: 40px;
    font-weight: 900;
    text-decoration: none;
    color: white;
    font-size: 18px;
}

.trust {
    text-align: center;
    font-size: 12px;
    color: #777;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <div class="logo">VipCam</div>
        <div>
            <div class="live-now">LIVE NOW</div>
            <div class="viewers" id="viewers">1,258 watching</div>
        </div>
    </div>

    <div class="video" onclick="go()">
        <div class="fallback-preview"></div>

        <div class="frame-wrap">
            <iframe
                id="liveFrame"
                src="https://www.owupwpoefdfxuuf.com/cp/lfb/index.php?submitconfig=0&promo=xcams&product_id=3&brand=xcams&ur=aHR0cHM6Ly93d3cueGNhbXMuY29t"
                allow="autoplay; fullscreen"
                loading="eager"
                referrerpolicy="no-referrer">
            </iframe>
        </div>

        <div class="notice">معاينة • اضغط للدخول</div>
        <div class="tag">✔ Verified Model</div>
    </div>

    <div class="content">
        <div class="title">اختر طريقة الدخول</div>

        <div class="card" onclick="go()">
            <div style="font-size:10px;color:#aaa;">Standard Access</div>
            <h3>دخول خاص 7 دقائق</h3>
            <div class="price">$14.39</div>
        </div>

        <div class="card vip" onclick="go()">
            <div class="badge">🔥 VIP موصى به</div>
            <h3>عرض VIP لمدة 15 دقيقة</h3>
            <div class="price">$29.69</div>

            <ul class="features">
                <li>114 رصيد (أفضل قيمة)</li>
                <li>كاميرا + صوت مباشر</li>
                <li>تحكم كامل بدون قيود</li>
            </ul>
        </div>
    </div>

    <div class="footer">
        <a href="YOUR_LINK" class="btn">الدخول إلى الغرفة الخاصة 🔒</a>
        <div class="trust">آمن • خاص • +18</div>
    </div>
</div>

<script>
// Viewer counter
let viewers = 1258;
setInterval(() => {
    viewers += Math.floor(Math.random() * 7) - 3;
    document.getElementById("viewers").innerText = viewers + " watching";
}, 3000);

// Redirect
function go() {
    window.location.href = "YOUR_LINK";
}

// Keep iframe alive if remote page busts the frame
const frame = document.getElementById("liveFrame");
let lastReload = 0;

function reloadFrameSoft() {
    const now = Date.now();
    if (now - lastReload < 4000) return;
    lastReload = now;

    frame.style.opacity = "0.01";
    setTimeout(() => {
        frame.src = "https://www.owupwpoefdfxuuf.com/cp/lfb/index.php?submitconfig=0&promo=xcams&product_id=3&brand=xcams&ur=aHR0cHM6Ly93d3cueGNhbXMuY29t&ts=" + Date.now();
        frame.style.opacity = "1";
    }, 220);
}

// periodic refresh to recover when the remote content clears itself
setInterval(reloadFrameSoft, 7000);

// also refresh once shortly after load, because that remote page often disappears after initial render
setTimeout(reloadFrameSoft, 1800);
</script>

</body>
</html>
